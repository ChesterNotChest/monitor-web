<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" height="100%">
  <!-- 页面背景 -->
  <rect width="1600" height="900" fill="#ffffff" />

  <!-- ========== 左侧：用户列表区域 ========== -->
  <rect x="50" y="40" width="1050" height="820" fill="#a8a8a8" stroke="#888888" stroke-width="2" />
  <text x="90" y="95" fill="#222222" font-size="28" font-family="Microsoft YaHei, sans-serif">用户管理</text>

<!-- 添加用户按钮 -->
  <rect x="320" y="60" width="180" height="55" fill="#e0e0e0" stroke="#bbbbbb" stroke-width="1" />
  <text x="410" y="98" text-anchor="middle" fill="#222222" font-size="24" font-family="Microsoft YaHei, sans-serif">添加用户</text>

  <!-- 用户卡片网格（3列） -->
  <!-- 第一行 -->
  <rect x="90" y="140" width="280" height="140" fill="#e0e0e0" stroke="#bbbbbb" stroke-width="1" />
  <text x="230" y="215" text-anchor="middle" fill="#222222" font-size="26" font-family="Microsoft YaHei, sans-serif">用户1</text>

  <rect x="400" y="140" width="280" height="140" fill="#e0e0e0" stroke="#bbbbbb" stroke-width="1" />
  <text x="540" y="215" text-anchor="middle" fill="#222222" font-size="26" font-family="Microsoft YaHei, sans-serif">用户2</text>

  <rect x="710" y="140" width="280" height="140" fill="#e0e0e0" stroke="#bbbbbb" stroke-width="1" />
  <text x="850" y="215" text-anchor="middle" fill="#222222" font-size="26" font-family="Microsoft YaHei, sans-serif">用户3</text>

  <!-- 第二行 -->
  <rect x="90" y="310" width="280" height="140" fill="#e0e0e0" stroke="#bbbbbb" stroke-width="1" />
  <text x="230" y="385" text-anchor="middle" fill="#555555" font-size="28" font-family="sans-serif">◦ ◦ ◦</text>

  <rect x="400" y="310" width="280" height="140" fill="#e0e0e0" stroke="#bbbbbb" stroke-width="1" />
  <rect x="710" y="310" width="280" height="140" fill="#e0e0e0" stroke="#bbbbbb" stroke-width="1" />

  <!-- 第三行 -->
  <rect x="90" y="480" width="280" height="140" fill="#e0e0e0" stroke="#bbbbbb" stroke-width="1" />
  <rect x="400" y="480" width="280" height="140" fill="#e0e0e0" stroke="#bbbbbb" stroke-width="1" />
  <rect x="710" y="480" width="280" height="140" fill="#e0e0e0" stroke="#bbbbbb" stroke-width="1" />

  <!-- ========== 右侧：用户详情与操作栏 ========== -->
  <rect x="1150" y="40" width="400" height="820" fill="#e0e0e0" stroke="#888888" stroke-width="2" />

  <!-- 用户基本信息区 -->
  <rect x="1180" y="80" width="340" height="220" fill="#a8a8a8" stroke="#888888" stroke-width="1" />
  <text x="1210" y="130" fill="#222222" font-size="22" font-family="Microsoft YaHei, sans-serif">用户姓名：张三</text>
  <text x="1210" y="175" fill="#222222" font-size="22" font-family="Microsoft YaHei, sans-serif">用户角色：安全员</text>
  <text x="1210" y="220" fill="#222222" font-size="22" font-family="Microsoft YaHei, sans-serif">权限等级：二级</text>
  <text x="1210" y="265" fill="#222222" font-size="22" font-family="Microsoft YaHei, sans-serif">账号状态：正常</text>

  <!-- 管理操作按钮 -->
  <rect x="1210" y="380" width="280" height="70" fill="#a8a8a8" stroke="#888888" stroke-width="1" />
  <text x="1350" y="425" text-anchor="middle" fill="#222222" font-size="24" font-family="Microsoft YaHei, sans-serif">修改信息</text>

  <rect x="1210" y="490" width="280" height="70" fill="#a8a8a8" stroke="#888888" stroke-width="1" />
  <text x="1350" y="535" text-anchor="middle" fill="#222222" font-size="24" font-family="Microsoft YaHei, sans-serif">权限管理</text>

  <rect x="1210" y="600" width="280" height="70" fill="#a8a8a8" stroke="#888888" stroke-width="1" />
  <text x="1350" y="645" text-anchor="middle" fill="#222222" font-size="24" font-family="Microsoft YaHei, sans-serif">删除用户</text>
</svg>