<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" height="100%">
  <!-- 整体页面背景 -->
  <rect width="1600" height="900" fill="#ffffff" />

  <!-- ========== 顶部统计信息栏 ========== -->
  <rect x="50" y="40" width="1500" height="140" fill="#b0b0b0" />
  
  <!-- 视图数统计卡片 -->
  <rect x="100" y="65" width="200" height="90" fill="#5a9ed6" />
  <text x="200" y="118" text-anchor="middle" fill="white" font-size="28" font-family="Microsoft YaHei, sans-serif">视图数：1</text>
  
  <!-- 监控数统计卡片 -->
  <rect x="340" y="65" width="200" height="90" fill="#5a9ed6" />
  <text x="440" y="118" text-anchor="middle" fill="white" font-size="28" font-family="Microsoft YaHei, sans-serif">监控数：1</text>
  
  <!-- 更多统计项省略符 -->
  <text x="800" y="118" text-anchor="middle" fill="#ffffff" font-size="36" font-family="sans-serif">···</text>
  
  <!-- 已解决告警统计 -->
  <rect x="1060" y="65" width="200" height="90" fill="#5a9ed6" />
  <text x="1160" y="118" text-anchor="middle" fill="white" font-size="28" font-family="Microsoft YaHei, sans-serif">已解决：1</text>
  
  <!-- 待处理告警统计 -->
  <rect x="1300" y="65" width="200" height="90" fill="#5a9ed6" />
  <text x="1400" y="118" text-anchor="middle" fill="white" font-size="28" font-family="Microsoft YaHei, sans-serif">待处理：1</text>

  <!-- ========== 左侧视图列表区域 ========== -->
  <rect x="50" y="220" width="980" height="640" fill="#b0b0b0" />
  
  <!-- 3列视图缩略图网格（可滚动区域示例） -->
  <!-- 第一行 -->
  <rect x="100" y="270" width="280" height="180" fill="#5a9ed6" />
  <rect x="410" y="270" width="280" height="180" fill="#5a9ed6" />
  <rect x="720" y="270" width="280" height="180" fill="#5a9ed6" />
  
  <!-- 第二行 -->
  <rect x="100" y="480" width="280" height="180" fill="#5a9ed6" />
  <rect x="410" y="480" width="280" height="180" fill="#5a9ed6" />
  <rect x="720" y="480" width="280" height="180" fill="#5a9ed6" />
  
  <!-- 第三行 -->
  <rect x="100" y="690" width="280" height="180" fill="#5a9ed6" />
  <rect x="410" y="690" width="280" height="180" fill="#5a9ed6" />
  <rect x="720" y="690" width="280" height="180" fill="#5a9ed6" />

  <!-- ========== 右侧告警列表区域 ========== -->
  <rect x="1070" y="220" width="480" height="640" fill="#b0b0b0" />
  
  <!-- 告警条目1 - 高级别（黄色） -->
  <rect x="1100" y="270" width="420" height="80" fill="#ffc107" />
  <rect x="1420" y="280" width="90" height="60" fill="#5a9ed6" />
  <text x="1465" y="318" text-anchor="middle" fill="white" font-size="22" font-family="Microsoft YaHei, sans-serif">进入视图</text>
  
  <!-- 告警条目2 - 中级别（橙色） -->
  <rect x="1100" y="390" width="420" height="80" fill="#e67e22" />
  <rect x="1420" y="400" width="90" height="60" fill="#5a9ed6" />
  <text x="1465" y="438" text-anchor="middle" fill="white" font-size="22" font-family="Microsoft YaHei, sans-serif">进入视图</text>
  
  <!-- 右下角功能按钮区 -->
  <rect x="1100" y="530" width="420" height="280" fill="#5a9ed6" />
  
  <!-- 第一行功能按钮 -->
  <rect x="1120" y="560" width="120" height="60" fill="#4a7fb8" />
  <text x="1180" y="598" text-anchor="middle" fill="white" font-size="22" font-family="Microsoft YaHei, sans-serif">查看日志</text>
  
  <rect x="1260" y="560" width="120" height="60" fill="#4a7fb8" />
  <text x="1320" y="598" text-anchor="middle" fill="white" font-size="22" font-family="Microsoft YaHei, sans-serif">用户管理</text>
  
  <rect x="1400" y="560" width="120" height="60" fill="#4a7fb8" />
  <text x="1460" y="598" text-anchor="middle" fill="white" font-size="22" font-family="Microsoft YaHei, sans-serif">人物管理</text>
  
  <!-- 第二行功能按钮（居中排列） -->
  <rect x="1180" y="660" width="120" height="60" fill="#4a7fb8" />
  <text x="1240" y="698" text-anchor="middle" fill="white" font-size="22" font-family="Microsoft YaHei, sans-serif">设备信息</text>
  
  <rect x="1320" y="660" width="120" height="60" fill="#4a7fb8" />
  <text x="1380" y="698" text-anchor="middle" fill="white" font-size="22" font-family="Microsoft YaHei, sans-serif">异常设置</text>
</svg>