<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" height="100%">
  <!-- 页面背景 -->
  <rect width="1600" height="900" fill="#ffffff" />

  <!-- ========== 左侧：实时监控画面区域 ========== -->
  <rect x="50" y="50" width="1050" height="800" fill="#b0b0b0" stroke="#888888" stroke-width="2" />
  <text x="575" y="450" text-anchor="middle" fill="white" font-size="64" font-family="Microsoft YaHei, sans-serif">
    实时雷霆监控画面
  </text>

  <!-- ========== 右侧：侧边栏 ========== -->
  <rect x="1150" y="50" width="400" height="800" fill="#b0b0b0" stroke="#888888" stroke-width="2" />

  <!-- 告警条目1 - 高级别（黄色） -->
  <rect x="1180" y="80" width="340" height="80" fill="#ffc107" stroke="#cc9a00" stroke-width="1" />
  <rect x="1430" y="90" width="80" height="60" fill="#ff0000" stroke="#cc0000" stroke-width="1" />
  <text x="1470" y="128" text-anchor="middle" fill="white" font-size="22" font-family="Microsoft YaHei, sans-serif">
    查看回放
  </text>

  <!-- 告警条目2 - 中级别（橙色） -->
  <rect x="1180" y="200" width="340" height="80" fill="#e67e22" stroke="#c56a1c" stroke-width="1" />
  <rect x="1430" y="210" width="80" height="60" fill="#ff0000" stroke="#cc0000" stroke-width="1" />
  <text x="1470" y="248" text-anchor="middle" fill="white" font-size="22" font-family="Microsoft YaHei, sans-serif">
    查看回放
  </text>

  <!-- ========== 底部：固定可用操作区 ========== -->
  <rect x="1180" y="620" width="340" height="180" fill="#5a9ed6" stroke="#4a7fb8" stroke-width="1" />
  <text x="1350" y="670" text-anchor="middle" fill="black" font-size="28" font-family="Microsoft YaHei, sans-serif">
    固定可用操作
  </text>

  <!-- 操作按钮 -->
  <rect x="1200" y="710" width="140" height="60" fill="#000000" stroke="#333333" stroke-width="1" />
  <text x="1270" y="748" text-anchor="middle" fill="white" font-size="22" font-family="Microsoft YaHei, sans-serif">
    编辑电子围栏
  </text>

  <rect x="1360" y="710" width="140" height="60" fill="#000000" stroke="#333333" stroke-width="1" />
  <text x="1430" y="748" text-anchor="middle" fill="white" font-size="22" font-family="Microsoft YaHei, sans-serif">
    手动录制
  </text>
</svg>