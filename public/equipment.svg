<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" height="100%">
  <!-- 页面背景 -->
  <rect width="1600" height="900" fill="#ffffff" />

  <!-- 整体外框 -->
  <rect x="50" y="40" width="1500" height="820" fill="#a8a8a8" stroke="#888888" stroke-width="2" />
  <text x="90" y="90" fill="#222222" font-size="28" font-family="Microsoft YaHei, sans-serif">设备信息</text>

  <!-- ========== 第一行节点 ========== -->
  <!-- 节点 node1（正常状态） -->
  <rect x="100" y="120" width="650" height="300" fill="#5a9ed6" stroke="#4a7fb8" stroke-width="2" />
  <text x="425" y="160" text-anchor="middle" fill="#222222" font-size="28" font-family="Microsoft YaHei, sans-serif">node1</text>

  <!-- video 设备区 -->
  <rect x="130" y="180" width="280" height="220" fill="#e0e0e0" />
  <text x="270" y="220" text-anchor="middle" fill="#222222" font-size="26" font-family="Microsoft YaHei, sans-serif">video</text>
  <!-- 设备1 -->
  <rect x="150" y="245" width="240" height="55" fill="#b8b8b8" rx="4" />
  <text x="230" y="282" text-anchor="middle" fill="#222222" font-size="22" font-family="Microsoft YaHei, sans-serif">设备名1</text>
  <circle cx="330" cy="272" r="8" fill="#2e9b3a" />
  <!-- 设备2 -->
  <rect x="150" y="315" width="240" height="55" fill="#b8b8b8" rx="4" />
  <text x="230" y="352" text-anchor="middle" fill="#222222" font-size="22" font-family="Microsoft YaHei, sans-serif">设备名2</text>
  <circle cx="330" cy="342" r="8" fill="#2e9b3a" />

